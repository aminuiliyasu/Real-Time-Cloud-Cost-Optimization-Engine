
services:
  postgres:
    image: postgres:16
    container_name: rtcco_postgres
    environment:
      POSTGRES_DB: cost_optimizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rtcco_redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
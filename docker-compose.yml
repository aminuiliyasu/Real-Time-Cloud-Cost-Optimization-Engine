services:
  postgres:
    image: postgres:16
    container_name: rtcco_postgres
    env_file: .env
    environment:
      POSTGRES_DB: cost_optimizer
      POSTGRES_USER: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: rtcco_redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    container_name: rtcco_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ~/.aws:/root/.aws:ro

  dashboard:
    build: ./dashboard
    container_name: rtcco_dashboard
    ports:
      - "5500:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
services:
  postgres:
    image: postgres:16
    container_name: rtcco_postgres
    env_file: .env
    environment:
      POSTGRES_DB: cost_optimizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: rtcco_redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    container_name: rtcco_api
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cost_optimizer
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ~/.aws:/root/.aws:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    container_name: rtcco_worker
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cost_optimizer
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "app.workers.scheduler", "--hours", "24", "--interval-seconds", "900"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ~/.aws:/root/.aws:ro

  dashboard:
    build: ./dashboard
    container_name: rtcco_dashboard
    ports:
      - "5500:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
